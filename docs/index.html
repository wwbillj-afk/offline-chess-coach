<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Coach</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background-color: #2a2a2a;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .coach-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #4CAF50;
        }
        h1 {
            color: #4CAF50;
            margin-bottom: 25px;
            font-size: 1.8em;
        }
        .navigation-buttons button {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .navigation-buttons button:hover {
            background-color: #45a049;
        }
        .navigation-buttons button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .rating-selection {
            margin-top: 30px;
            text-align: left;
        }
        .rating-selection label {
            display: block;
            margin-bottom: 10px;
            font-size: 1em;
            color: #bbb;
        }
        .rating-selection select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #555;
            background-color: #3a3a3a;
            color: #e0e0e0;
            font-size: 1em;
            appearance: none;
            -webkit-appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23e0e0e0%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-6.5%200-12.3%203.2-16.1%208.1-3.8%204.9-4.5%2011.6-2.2%2017.4l139.3%20139.3c3.8%203.8%209%205.9%2014.2%205.9s10.4-2.1%2014.2-5.9l139.3-139.3c4.7-4.7%205.7-11.8%202.8-17.7z%22/%3E%3C/svg%3E');
            background-repeat: no-repeat;
            background-position: right 10px top 50%;
            background-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="coach.png" alt="Coach Avatar" class="coach-avatar">
        <h1>Hello, aspiring chess master!</h1>
        <div class="navigation-buttons">
            <button onclick="location.href='play.html'">Play</button>
            <button disabled>Learn (Coming Soon)</button>
            <button disabled>Puzzles (Coming Soon)</button>
        </div>
        <div class="rating-selection">
            <label for="rating">Select Opponent Rating:</label>
            <select id="rating">
                <option value="250">250 (Beginner)</option>
                <option value="500">500 (Beginner)</option>
                <option value="800">800 (Intermediate)</option>
                <option value="1200">1200 (Intermediate)</option>
                <option value="1600">1600 (Advanced)</option>
                <option value="2000">2000 (Advanced)</option>
                <option value="2400">2400 (Expert)</option>
                <option value="2800">2800 (Master)</option>
                <option value="3200">3200 (Grandmaster)</option>
            </select>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ratingSelect = document.getElementById('rating');
            const savedRating = localStorage.getItem('chessCoachRating');

            if (savedRating) {
                ratingSelect.value = savedRating;
            } else {
                ratingSelect.value = '1200'; // Default to Intermediate
                localStorage.setItem('chessCoachRating', '1200');
            }

            ratingSelect.addEventListener('change', (event) => {
                localStorage.setItem('chessCoachRating', event.target.value);
            });
        });
    </script>
    <script>
        if (
            'serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered: ', registration);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</body>
</html>
