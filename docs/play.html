<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title>Offline Chess Coach</title>

    <link rel="stylesheet"
          href="css/style.css" />

</head>

<body>

    <div class="app-container">

        <!-- HEADER -->
        <div class="header">

            <img src="coach.png"
                 class="coach-avatar" />

            <div class="speech-bubble"
                 id="coach-feedback">

                Welcome! Let's play some chess.

            </div>

        </div>

        <!-- STATUS -->
        <div class="game-status"
             id="game-status">

            White to move

        </div>

        <!-- BOARD -->
        <div class="board-container"
             id="board">

        </div>

        <!-- BUTTONS -->
        <div class="controls">

            <button onclick="startGame()">

                New Game

            </button>

            <button onclick="location.href='index.html'">

                Back to Home

            </button>

        </div>

    </div>

    <script src="js/game.js"></script>

</body>

</html>
