<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Chess</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 360px;
        }

        .coach-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #4CAF50;
            margin-right: 15px;
        }

        .speech-bubble {
            background-color: #3a3a3a;
            border-radius: 10px;
            padding: 10px 15px;
            position: relative;
            flex-grow: 1;
        }

        .board-container {
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.7);
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .light {
            background: #dbe4ea;
        }

        .dark {
            background: #6f8fa3;
        }

        .piece-svg {
            width: 80%;
            height: 80%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 34px;
            user-select: none;
        }

        .game-status {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .controls button {
            padding: 10px 20px;
            margin: 0 10px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        .controls button:hover {
            background: #45a049;
        }

    </style>

</head>

<body>

    <div class="header">
        <img src="coach.png" class="coach-avatar">

        <div class="speech-bubble" id="coach-feedback">
            Welcome! Let's play some chess.
        </div>
    </div>

    <div class="game-status" id="game-status">
        White to move
    </div>

    <div class="board-container" id="chess-board"></div>

    <div class="controls">
        <button id="new-game-btn">New Game</button>

        <button onclick="location.href='index.html'">
            Back to Home
        </button>
    </div>

    <script>

        const SVG_PIECES = {

            'P': '♙',
            'R': '♖',
            'N': '♘',
            'B': '♗',
            'Q': '♕',
            'K': '♔',

            'p': '♟',
            'r': '♜',
            'n': '♞',
            'b': '♝',
            'q': '♛',
            'k': '♚'
        };

    </script>

    <!-- CHESS ENGINE -->
    <script src="chess.min.js"></script>

    <!-- YOUR GAME CODE -->
    <script src="chess.js"></script>

    <script>

        window.addEventListener('load', () => {

            const boardContainer =
                document.getElementById('chess-board');

            const newGameBtn =
                document.getElementById('new-game-btn');

            window.renderBoard = function () {

                boardContainer.innerHTML = '';

                for (let i = 0; i < 64; i++) {

                    const square =
                        document.createElement('div');

                    square.classList.add('square');

                    const row = Math.floor(i / 8);
                    const col = i % 8;

                    if ((row + col) % 2 === 0) {
                        square.classList.add('light');
                    } else {
                        square.classList.add('dark');
                    }

                    const piece = board[i];

                    if (piece) {

                        const pieceEl =
                            document.createElement('div');

                        pieceEl.classList.add('piece-svg');

                        pieceEl.innerHTML =
                            SVG_PIECES[piece];

                        square.appendChild(pieceEl);
                    }

                    square.addEventListener('click', () => {
                        handleSquareClick(i);
                    });

                    boardContainer.appendChild(square);
                }
            };

            initGame();

            newGameBtn.addEventListener('click', initGame);

            if ('serviceWorker' in navigator) {

                navigator.serviceWorker
                    .register('./sw.js')
                    .then(() => {
                        console.log(
                            'Service Worker Registered'
                        );
                    });
            }
        });

    </script>

</body>
</html>
